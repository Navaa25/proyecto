<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEDRAUI • Punto de Venta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #f47c00;
            color: white;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #004b93;
            border-bottom: 2px solid #004b93;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-field {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .btn-add {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            align-self: flex-end;
            height: 42px;
        }
        .btn-add:hover {
            background-color: #1b5e20;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #eeeeee;
            color: #333;
        }
        .total-container {
            text-align: right;
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
            color: #f47c00;
        }
        .section-sync {
            margin-top: 40px;
        }
        .sync-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .btn-sync {
            display: block;
            width: 100%;
            background-color: #0f4c93;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
        }
        .btn-sync:hover {
            background-color: #0a3568;
        }
    </style>
</head>
<body>

    <div class="header">
        CHEDRAUI • Punto de Venta (Caja 01)
    </div>

    <div class="container">
        <!-- SECCIÓN REGISTRO -->
        <h2>Agregar Productos a la Venta (Modo Local)</h2>
        
        <div class="form-group">
            <div class="input-field">
                <label>Producto:</label>
                <input type="text" id="producto" placeholder="Ej. Bolsa de Totopos">
            </div>
            <div class="input-field">
                <label>Precio ($):</label>
                <input type="number" id="precio" placeholder="0.00" step="0.01">
            </div>
            <div class="input-field">
                <label>Cantidad:</label>
                <input type="number" id="cantidad" value="1" min="1">
            </div>
            <button class="btn-add" id="btnAgregar">+ Agregar al Carrito</button>
        </div>

        <!-- TABLA -->
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio Unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <!-- Aquí se van metiendo los renglones con JS -->
            </tbody>
        </table>

        <div class="total-container">
            Total a Pagar: $<span id="totalPago">0.00</span>
        </div>

        <!-- SECCIÓN SINCRONIZAR -->
        <div class="section-sync">
            <h2>Subir Venta a Internet</h2>
            <p class="sync-text">
                Dale clic al botón de abajo para mandar las ventas guardadas de la compu directo a la base de datos de MongoDB.
            </p>
            <button class="btn-sync" id="btnSincronizar">
                💾 Guardar Venta en la Nube
            </button>
        </div>
    </div>

    <!-- LÓGICA DE INDEXEDDB Y APIS -->
    <script>
        let db;
        const bdNombre = "ChedrauiPOS";
        const bdVersion = 1;

        // Abrir la base de datos del navegador (IndexedDB)
        const solicitud = indexedDB.open(bdNombre, bdVersion);

        solicitud.onerror = function(e) {
            console.error("Error con la base de datos local:", e);
        };

        solicitud.onsuccess = function(e) {
            db = e.target.result;
            mostrarCarrito();
        };

        solicitud.onupgradeneeded = function(e) {
            let bdLocal = e.target.result;
            if (!bdLocal.objectStoreNames.contains("carrito")) {
                bdLocal.createObjectStore("carrito", { keyPath: "id", autoIncrement: true });
            }
        };

        // Evento para agregar cosas al carrito local
        document.getElementById("btnAgregar").addEventListener("click", () => {
            const nombre = document.getElementById("producto").value;
            const precio = parseFloat(document.getElementById("precio").value);
            const cantidad = parseInt(document.getElementById("cantidad").value);

            if (!nombre || isNaN(precio) || isNaN(cantidad)) {
                alert("Completa todos los campos primero");
                return;
            }

            const item = {
                producto: nombre,
                precio: precio,
                cantidad: cantidad,
                subtotal: precio * cantidad
            };

            const transaccion = db.transaction(["carrito"], "readwrite");
            const almacen = transaccion.objectStore("add" ? "carrito" : "carrito");
            
            almacen.add(item).onsuccess = () => {
                // Limpiar inputs
                document.getElementById("producto").value = "";
                document.getElementById("precio").value = "";
                document.getElementById("cantidad").value = "1";
                mostrarCarrito();
            };
        });

        // Función para pintar la tabla con lo que hay guardado en la compu
        function mostrarCarrito() {
            const cuerpo = document.getElementById("tablaCuerpo");
            cuerpo.innerHTML = "";
            let total = 0;

            const almacen = db.transaction("carrito").objectStore("carrito");
            almacen.openCursor().onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    const fila = cursor.value;
                    total += fila.subtotal;

                    cuerpo.innerHTML += `
                        <tr>
                            <td>${fila.producto}</td>
                            <td>$${fila.precio.toFixed(2)}</td>
                            <td>${fila.cantidad}</td>
                            <td>$${fila.subtotal.toFixed(2)}</td>
                        </tr>
                    `;
                    cursor.continue();
                } else {
                    document.getElementById("totalPago").innerText = total.toFixed(2);
                }
            };
        }

        // Enviar datos al Backend de Python en Render
        document.getElementById("btnSincronizar").addEventListener("click", () => {
            const transaccion = db.transaction(["carrito"], "readonly");
            const almacen = transaccion.objectStore("carrito");
            const todosLosProductos = [];

            almacen.openCursor().onsuccess = function(e) {
                const cursor = e.target.result;
                if (cursor) {
                    todosLosProductos.push(cursor.value);
                    cursor.continue();
                } else {
                    if (todosLosProductos.length === 0) {
                        alert("El carrito está vacío, agrega algo antes de subirlo.");
                        return;
                    }

                    const totalVenta = parseFloat(document.getElementById("totalPago").innerText);
                    const datosParaSubir = {
                        productos: todosLosProductos,
                        total: totalVenta,
                        fecha: new Date().toISOString()
                    };

                    // Mandar la info usando la URL actual de tu Render
                    fetch("/api/sincronizar", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(datosParaSubir)
                    })
                    .then(res => res.json())
                    .then(data => {
                        alert("¡Listo! Venta guardada con éxito en MongoDB.");
                        
                        // Vaciar el carrito de IndexedDB para la siguiente venta
                        const borrarTransaccion = db.transaction(["carrito"], "readwrite");
                        borrarTransaccion.objectStore("carrito").clear().onsuccess = () => {
                            mostrarCarrito();
                        };
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Hubo un fallo al conectar con el servidor.");
                    });
                }
            };
        });
    </script>
</body>
</html>
